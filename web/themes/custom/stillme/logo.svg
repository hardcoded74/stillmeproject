<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F4E79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F8F8B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circular embrace ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#grad1)" stroke-width="4" opacity="0.25"/>

  <!-- Left figure -->
  <g transform="translate(65, 55)">
    <!-- Head -->
    <circle cx="12" cy="12" r="12" fill="#1F4E79"/>
    <!-- Body curve reaching toward center -->
    <path d="M12 24 C12 44, 4 60, 4 80 C4 90, 8 95, 16 95"
          fill="none" stroke="#1F4E79" stroke-width="6" stroke-linecap="round"/>
    <!-- Arm reaching toward shared heart -->
    <path d="M12 45 C20 38, 30 35, 40 40"
          fill="none" stroke="#1F4E79" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Right figure (mirrored) -->
  <g transform="translate(135, 55) scale(-1,1)">
    <!-- Head -->
    <circle cx="12" cy="12" r="12" fill="#2F8F8B"/>
    <!-- Body curve -->
    <path d="M12 24 C12 44, 4 60, 4 80 C4 90, 8 95, 16 95"
          fill="none" stroke="#2F8F8B" stroke-width="6" stroke-linecap="round"/>
    <!-- Arm reaching toward shared heart -->
    <path d="M12 45 C20 38, 30 35, 40 40"
          fill="none" stroke="#2F8F8B" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Shared heart between figures -->
  <path d="M100 82 C100 78, 94 72, 89 72 C84 72, 80 76, 80 81 C80 90, 100 102, 100 102 C100 102, 120 90, 120 81 C120 76, 116 72, 111 72 C106 72, 100 78, 100 82 Z"
        fill="#F4C542" opacity="0.9"/>

  <!-- Subtle outer glow dots suggesting community/embrace -->
  <circle cx="100" cy="15" r="3" fill="#F4C542" opacity="0.5"/>
  <circle cx="44" cy="45" r="2.5" fill="#1F4E79" opacity="0.3"/>
  <circle cx="156" cy="45" r="2.5" fill="#2F8F8B" opacity="0.3"/>
  <circle cx="38" cy="130" r="2.5" fill="#1F4E79" opacity="0.3"/>
  <circle cx="162" cy="130" r="2.5" fill="#2F8F8B" opacity="0.3"/>
  <circle cx="100" cy="185" r="3" fill="#F4C542" opacity="0.5"/>
</svg>
